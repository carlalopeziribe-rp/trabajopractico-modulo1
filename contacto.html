<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - MI Centro de Bienestar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Indie+Flower&family=Quicksand:wght@300..700&display=swap"
        rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">
            <img class="navbar-brand" src="imagenes/MI Centro de bienestar-12.png" alt="logo" width="100" height="100">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav gap-4">
                    <a class="nav-link" aria-current="page" href="index.html">Inicio</a>
                    <a class="nav-link" href="servicios.html">Servicios</a>
                    <a class="nav-link active" href="contacto.html">Contacto</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="rol">
            <div class="col">
                <h4>Contactanos</h4>
            </div>
        </div>
    </div>
    <div class="row justify-content-start">
        <div class="col-md-6">
            <form class="d-flex flex-column m-4">
                <div class="mb-3">
                    <label for="name" class="form-label">Nombre: </label>
                    <input type="text" id="name" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email: </label>
                    <input type="email" id="email" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="consulta" class="form-label">Consulta: </label>
                    <textarea id="consulta" class="form-control"></textarea>
                </div>
                <div class="d-grid gap-2 d-md-block">
                    <button class="btn btn-enviar" type="button">Enviar</button>
                </div>
            </form>
        </div>
    </div>
